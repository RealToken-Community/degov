# Wallet connection related configuration
wallet:
  walletConnectProjectId: faf5e91ac5ed4d0a94d2648a6fcc9daa

# Chain information: these commented fields are optional if this chain can be accessed by viem.
chain:
  id: 100
  name: Gnosis
  logo: https://assets.coingecko.com/coins/images/662/standard/logo_square_simple_300px.png
  rpcs:
    - https://rpc.gnosischain.com
  explorers:
    - https://gnosisscan.io/
  nativeToken:
    symbol: xDAI
    decimals: 18
    priceId: xdai
    logo: https://assets.coingecko.com/coins/images/11062/standard/Identity-Primary-DarkBG.png

# Indexer related configuration
indexer:
  endpoint: https://api.degov.backup.realtoken.community/graphql
  startBlock: 35476388
  gateway: https://v2.archive.subsquid.io/network/gnosis-mainnet

  ## https://docs.sqd.ai/sdk/reference/processors/evm-batch/general/#set-finality-confirmation
  #finalityConfirmation: 50
  ## https://docs.sqd.ai/sdk/reference/processors/substrate-batch/general/#set-rpc-endpoint
  capacity: 10
  ## https://docs.sqd.ai/sdk/reference/processors/substrate-batch/general/#set-rpc-endpoint
  maxBatchCallSize: 500
  ## https://docs.sqd.ai/subsquid-network/reference/networks/#evm--ethereum-compatible
  #gateway:

